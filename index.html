<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>娱乐圈经纪人模拟器</title>
  <style>
    :root {
      --cyan: #a4d7eb;
      --lavender: #cac2ff;
      --gold: #f7d27a;
      --hot: #ff8d9f;
      --danger: #ff6a72;
      --ok: #7ee0c4;
      --ink: #f5f8ff;
      --muted: rgba(245, 248, 255, .68);
      --panel: rgba(20, 24, 45, .58);
      --panel-strong: rgba(16, 18, 38, .78);
      --line: rgba(202, 194, 255, .35);
      --glow: 0 0 22px rgba(164, 215, 235, .26), 0 0 40px rgba(202, 194, 255, .18);
      --radius: 18px;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100svh;
      color: var(--ink);
      background:
        linear-gradient(120deg, rgba(8, 12, 30, .82), rgba(33, 20, 58, .72)),
        url("https://s1.imagehub.cc/images/2025/05/13/59f01480f11cb2c8bed41cba0cdd1b9d.jpg") center / cover fixed;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 22% 10%, rgba(164, 215, 235, .22), transparent 28%),
        radial-gradient(circle at 78% 18%, rgba(202, 194, 255, .2), transparent 30%),
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: auto, auto, 38px 38px, 38px 38px;
      mix-blend-mode: screen;
    }

    button, input, select { font: inherit; }

    button {
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 999px;
      color: var(--ink);
      background: linear-gradient(135deg, rgba(164,215,235,.22), rgba(202,194,255,.2));
      box-shadow: 0 0 0 transparent;
      min-height: 38px;
      padding: 9px 15px;
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease, background .18s ease, opacity .18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(164,215,235,.76);
      box-shadow: var(--glow);
    }

    button:active { transform: translateY(1px) scale(.99); }
    button:disabled { opacity: .42; cursor: not-allowed; transform: none; box-shadow: none; }

    input, select {
      width: 100%;
      color: var(--ink);
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.24);
      border-radius: 14px;
      padding: 12px 14px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(164,215,235,.14);
    }

    select option {
      color: #f5f8ff;
      background: #12182f;
    }

    .hidden { display: none !important; }

    .screen {
      position: relative;
      min-height: 100svh;
      padding: 22px;
      animation: rise .55s ease both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .glass {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--glow);
      backdrop-filter: blur(18px);
    }

    .start {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .start-inner {
      width: min(1040px, 100%);
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 26px;
      align-items: stretch;
    }

    .poster {
      min-height: 610px;
      padding: 48px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      position: relative;
    }

    .poster::after {
      content: "";
      position: absolute;
      inset: auto -6% -10% -6%;
      height: 220px;
      background: linear-gradient(90deg, rgba(164,215,235,.16), rgba(202,194,255,.24), rgba(247,210,122,.1));
      filter: blur(22px);
      transform: rotate(-3deg);
    }

    .eyebrow {
      color: var(--cyan);
      letter-spacing: .12em;
      font-size: 13px;
      text-transform: uppercase;
    }

    h1, h2, h3 { margin: 0; letter-spacing: 0; }

    h1 {
      margin-top: 18px;
      font-size: clamp(46px, 7vw, 90px);
      line-height: .98;
      text-shadow: 0 0 28px rgba(202,194,255,.35);
    }

    .lead {
      margin: 20px 0 0;
      max-width: 580px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 17px;
    }

    .start-form {
      padding: 26px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .form-row { display: grid; gap: 8px; }
    .form-row label { color: var(--muted); font-size: 13px; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; }
    .primary {
      color: #10162c;
      background: linear-gradient(135deg, var(--cyan), var(--lavender));
      border-color: rgba(255,255,255,.56);
      font-weight: 800;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 16px;
      max-width: 1680px;
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 10px;
      z-index: 15;
      display: grid;
      grid-template-columns: minmax(210px, 1fr) repeat(5, minmax(120px, .7fr)) auto;
      gap: 10px;
      align-items: center;
      padding: 12px;
    }

    .metric {
      border-radius: 14px;
      padding: 10px 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      min-width: 0;
    }

    .metric .label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .metric strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 18px;
    }

    .layout {
      display: grid;
      grid-template-columns: 315px minmax(420px, 1fr) 350px;
      gap: 16px;
      min-height: calc(100svh - 118px);
    }

    .panel {
      padding: 16px;
      overflow: hidden;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .panel-title h2, .panel-title h3 { font-size: 18px; }
    .subtle { color: var(--muted); font-size: 13px; }

    .profile {
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 14px;
      align-items: center;
      margin-bottom: 15px;
    }

    .avatar {
      width: 76px;
      height: 76px;
      border-radius: 20px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,.42);
      box-shadow: 0 0 22px rgba(164,215,235,.25);
      background: rgba(255,255,255,.08);
    }

    .artist-card {
      display: grid;
      grid-template-columns: 54px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-radius: 16px;
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.11);
      margin-bottom: 9px;
      cursor: pointer;
      transition: border-color .18s ease, background .18s ease, transform .18s ease;
    }

    .artist-card:hover, .artist-card.active {
      background: rgba(164,215,235,.12);
      border-color: rgba(164,215,235,.54);
      transform: translateX(2px);
    }

    .artist-card img,
    .artist-portrait {
      width: 54px;
      height: 54px;
      border-radius: 15px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,.3);
    }

    .badge, .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.86);
      white-space: nowrap;
    }

    .badge.gold { color: #2c230c; background: linear-gradient(135deg, #ffe5a3, #f2be51); }
    .tag.hot { border-color: rgba(255,141,159,.44); color: #ffd7de; }
    .tag.danger { border-color: rgba(255,106,114,.55); color: #ffc4c8; }
    .tag.ok { border-color: rgba(126,224,196,.45); color: #c8ffef; }

    .main-stage {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 16px;
    }

    .event {
      min-height: 235px;
      padding: 22px;
      position: relative;
      overflow: hidden;
    }

    .event::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(164,215,235,.1), rgba(202,194,255,.1), transparent 55%);
      pointer-events: none;
    }

    .event h2 {
      position: relative;
      font-size: 27px;
      margin-bottom: 10px;
    }

    .event p {
      position: relative;
      color: rgba(245,248,255,.8);
      line-height: 1.8;
      margin: 0 0 18px;
    }

    .event-meta {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 14px;
    }

    .event-meta .tag {
      max-width: 100%;
      white-space: normal;
      line-height: 1.45;
    }

    .choice-grid {
      position: relative;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .choice {
      border-radius: 16px;
      padding: 13px;
      min-height: 76px;
      text-align: left;
      background: rgba(255,255,255,.08);
    }

    .choice strong { display: block; margin-bottom: 4px; }
    .choice span { color: var(--muted); font-size: 12px; line-height: 1.5; }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px;
    }

    .tab.active {
      color: #10162c;
      background: linear-gradient(135deg, var(--cyan), var(--lavender));
      border-color: transparent;
      font-weight: 800;
    }

    .workspace {
      padding: 16px;
      min-height: 300px;
      overflow: auto;
      max-height: calc(100svh - 470px);
    }

    .grid-two {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .mini-card {
      border-radius: 16px;
      padding: 13px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
    }

    .mini-card.resource-won {
      border-color: rgba(126, 224, 196, .56);
      background: linear-gradient(135deg, rgba(126,224,196,.18), rgba(255,255,255,.055));
      box-shadow: 0 0 20px rgba(126,224,196,.12);
    }

    .mini-card.resource-lost {
      border-color: rgba(255, 106, 114, .56);
      background: linear-gradient(135deg, rgba(255,106,114,.2), rgba(255,255,255,.055));
      box-shadow: 0 0 20px rgba(255,106,114,.1);
    }

    .mini-card h3 { font-size: 16px; margin-bottom: 7px; }
    .mini-card p { color: var(--muted); line-height: 1.7; margin: 4px 0 10px; font-size: 13px; }

    .bar {
      height: 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.1);
      overflow: hidden;
      margin-top: 6px;
    }

    .bar i {
      display: block;
      height: 100%;
      width: var(--v);
      background: linear-gradient(90deg, var(--cyan), var(--lavender));
      box-shadow: 0 0 14px rgba(164,215,235,.45);
    }

    .bar.danger i { background: linear-gradient(90deg, #ffb36d, var(--danger)); }
    .stat-list { display: grid; gap: 9px; }
    .stat-row { display: grid; grid-template-columns: 84px 1fr 36px; gap: 9px; align-items: center; font-size: 13px; color: var(--muted); }

    .right-stack {
      display: grid;
      gap: 16px;
      grid-template-rows: auto auto 1fr;
    }

    .ticker {
      display: grid;
      gap: 8px;
      max-height: 180px;
      overflow: auto;
    }

    .ticker-item {
      padding: 9px 10px;
      border-radius: 14px;
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.1);
      color: rgba(245,248,255,.8);
      font-size: 13px;
      line-height: 1.55;
    }

    .log {
      max-height: 330px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .log-entry {
      padding: 9px 10px;
      border-left: 3px solid var(--cyan);
      border-radius: 10px;
      background: rgba(255,255,255,.055);
      color: rgba(245,248,255,.78);
      font-size: 13px;
      line-height: 1.55;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 20;
      background: rgba(5, 7, 18, .66);
      padding: 22px;
    }

    .modal-box {
      width: min(860px, 100%);
      max-height: 86svh;
      overflow: auto;
      padding: 22px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      z-index: 30;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(10, 15, 34, .86);
      border: 1px solid rgba(164,215,235,.5);
      box-shadow: var(--glow);
      transition: opacity .2s ease, transform .2s ease;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .warn {
      border-color: rgba(255,106,114,.48);
      background: rgba(255,106,114,.12);
      color: #ffd4d7;
    }

    .empty {
      padding: 26px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed rgba(255,255,255,.2);
      border-radius: 16px;
    }

    @media (max-width: 1180px) {
      .topbar { grid-template-columns: repeat(3, 1fr); }
      .layout { grid-template-columns: 280px 1fr; }
      .right-stack { grid-column: 1 / -1; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    @media (max-width: 820px) {
      .screen { padding: 10px; }
      .start-inner, .layout, .grid-two, .choice-grid, .right-stack { grid-template-columns: 1fr; }
      .poster { min-height: 440px; padding: 28px; }
      .app { gap: 12px; }
      .topbar {
        top: 8px;
        display: flex;
        overflow-x: auto;
        overscroll-behavior-x: contain;
        scrollbar-width: none;
        padding: 10px;
        gap: 8px;
        border-radius: 16px;
      }
      .topbar::-webkit-scrollbar { display: none; }
      .topbar .metric {
        flex: 0 0 138px;
        padding: 8px 10px;
        border-radius: 12px;
      }
      .topbar .metric:first-child { flex-basis: 168px; }
      .topbar .metric .label { font-size: 11px; margin-bottom: 3px; }
      .topbar .metric strong { font-size: 15px; }
      .topbar .actions {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .topbar .actions button {
        min-height: 34px;
        padding: 7px 11px;
        white-space: nowrap;
      }
      .workspace { max-height: none; }
      .layout { min-height: auto; }
    }
  </style>
</head>
<body>
  <main id="startScreen" class="screen start">
    <section class="start-inner">
      <div class="poster glass">
        <div>
          <div class="eyebrow">NEON TALENT AGENCY</div>
          <h1>娱乐圈经纪人模拟器</h1>
          <p class="lead">你将以第一人称管理艺人、争夺资源、压住热搜、对抗竞品公司。每个时段都会结算，压力、人脉、资金与口碑都会留下痕迹。</p>
        </div>
        <div class="actions">
          <span class="tag ok">四段时段推进</span>
          <span class="tag hot">舆情与危机</span>
          <span class="tag">本地自动存档</span>
        </div>
      </div>
      <form id="startForm" class="start-form glass">
        <div class="panel-title">
          <h2>初始化游戏</h2>
          <span id="saveHint" class="subtle">未检测到存档</span>
        </div>
        <div class="profile">
          <img class="avatar" alt="主控头像" src="https://s1.imagehub.cc/images/2025/05/08/46ffd416a2c135f6274369b34082113c.jpg">
          <div>
            <h3>新锐经纪人</h3>
            <div class="subtle">从晨间会议开始，带着三名初始艺人杀入排位。</div>
          </div>
        </div>
        <div class="form-row">
          <label for="playerName">主控姓名</label>
          <input id="playerName" maxlength="12" value="林希" autocomplete="off">
        </div>
        <div class="form-row">
          <label for="agencyName">工作室名称</label>
          <input id="agencyName" maxlength="14" value="极光艺能" autocomplete="off">
        </div>
        <div class="form-row">
          <label for="playerAge">主控年龄</label>
          <input id="playerAge" type="number" min="20" max="35" value="26" autocomplete="off">
        </div>
        <div class="form-row">
          <label for="stylePick">身份背景</label>
          <select id="stylePick">
            <option value="传媒实习生">传媒实习生：均衡起步，资源偏低</option>
            <option value="星二代">星二代：家族人脉高，舆情波动更明显</option>
            <option value="海归精英">海归精英：海外资源与谈判起点更高</option>
            <option value="草根逆袭">草根逆袭：初始资源少，但信赖成长更快</option>
            <option value="学院派">学院派：法务与理论能力更稳</option>
          </select>
        </div>
        <div class="actions">
          <button class="primary" type="submit">开始新档</button>
          <button id="continueBtn" type="button">继续存档</button>
          <button id="wipeBtn" type="button">清除存档</button>
        </div>
      </form>
    </section>
  </main>

  <main id="gameScreen" class="screen app hidden">
    <header class="topbar glass">
      <div class="metric"><span class="label">日期 / 时段</span><strong id="dateText">第 1 天 晨间会议</strong></div>
      <div class="metric"><span class="label">资金</span><strong id="moneyText">0 万</strong></div>
      <div class="metric"><span class="label">压力</span><strong id="stressText">0</strong></div>
      <div class="metric"><span class="label">道德值</span><strong id="moraleText">0</strong></div>
      <div class="metric"><span class="label">人脉值</span><strong id="networkText">0</strong></div>
      <div class="metric"><span class="label">行业影响</span><strong id="influenceText">0</strong></div>
      <div class="actions">
        <button id="saveBtn">手动存档</button>
        <button id="restartBtn">重开</button>
      </div>
    </header>

    <section class="layout">
      <aside class="panel glass">
        <div class="panel-title">
          <h2>主控资料</h2>
          <span id="debuffTag" class="tag">状态稳定</span>
        </div>
        <div class="profile">
          <img class="avatar" alt="主控头像" src="https://s1.imagehub.cc/images/2025/05/08/46ffd416a2c135f6274369b34082113c.jpg">
          <div>
            <h3 id="playerTitle">林希</h3>
            <div id="agencyTitle" class="subtle">极光艺能 · 新锐经纪人</div>
          </div>
        </div>
        <div id="playerStats" class="stat-list"></div>
        <div class="panel-title" style="margin-top:18px">
          <h2>旗下艺人</h2>
          <span id="artistCount" class="subtle">0 人</span>
        </div>
        <div id="ownedArtists"></div>
      </aside>

      <section class="main-stage">
        <div id="eventCard" class="event glass"></div>
        <nav class="tabs glass">
          <button class="tab active" data-tab="todo">待办</button>
          <button class="tab" data-tab="artists">艺人详情</button>
          <button class="tab" data-tab="resources">资源池</button>
          <button class="tab" data-tab="crisis">危机公关</button>
          <button class="tab" data-tab="market">签约市场</button>
        </nav>
        <div id="workspace" class="workspace glass"></div>
      </section>

      <aside class="right-stack">
        <section class="panel glass">
          <div class="panel-title"><h2>舆情动态</h2><span id="riskBadge" class="tag">低风险</span></div>
          <div id="newsFeed" class="ticker"></div>
        </section>
        <section class="panel glass">
          <div class="panel-title"><h2>竞品动态</h2><span class="tag hot">AI 行动</span></div>
          <div id="rivalFeed" class="ticker"></div>
        </section>
        <section class="panel glass">
          <div class="panel-title"><h2>日志记录</h2><button id="logBtn">查看日志</button></div>
          <div id="logFeed" class="log"></div>
        </section>
      </aside>
    </section>
  </main>

  <div id="modal" class="modal hidden"></div>
  <div id="toast" class="toast"></div>

  <script>
    const SAVE_KEY = "neon_agent_simulator_save_v1";
    const timeSlots = ["晨间会议", "白天工作", "黄金时段", "午夜攻坚"];
    const mainAvatar = "https://s1.imagehub.cc/images/2025/05/08/46ffd416a2c135f6274369b34082113c.jpg";
    const routes = ["影视演员", "唱跳偶像", "综艺新星", "时尚宠儿", "全能艺人"];
    const resourceTypes = ["影视", "综艺", "代言", "杂志", "商务"];

    const state = {
      game: null,
      selectedArtistId: null,
      currentTab: "todo",
      currentEvent: null
    };

    const $ = (id) => document.getElementById(id);

    function makeArtist(row, index, owned = false, rival = null) {

    function loadGame() {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return null;
      try { return migrateSave(JSON.parse(raw)); } catch { return null; }
    }

    function migrateSave(game) {
      if (!game || !Array.isArray(game.artists)) return game;
      const debutByRating = {S: "二线", A: "三线", B: "十八线", C: "素人", D: "素人"};
      const contractByRating = {S: "自主权协议", A: "分成约", B: "新人约", C: "新人约", D: "新人约"};
      const numericPlayerKeys = ["stress", "morale", "network", "insight", "negotiation", "pr", "networkSkill", "legal", "influence", "trustSense", "mediaSense"];
      numericPlayerKeys.forEach((key) => {
        if (game.player?.[key] !== undefined) game.player[key] = scaleTo1000(game.player[key]);
      });
      if (!game.player.age) game.player.age = 26;
      if (!game.player.background) game.player.background = "传媒实习生";
      if (game.player.money < 500) game.player.money = Math.max(500, game.player.money);
      if (game.player.familyNetwork === undefined) game.player.familyNetwork = 120;
      if (game.player.overseasResources === undefined) game.player.overseasResources = 120;
      if (!game.player.career || game.player.career === "新锐经纪人") game.player.career = "实习助理";
      const ownedCount = game.artists.filter((artist) => artist.owner === "player").length;
      if (!game.artistManager) game.artistManager = {artistRosterCapacity: Math.min(5, Math.max(1, ownedCount))};
      game.artists.forEach((artist, index) => {
        if (!artist.age) artist.age = 19 + (index % 8);
        if (!artist.debutStatus) artist.debutStatus = debutByRating[artist.rating] || "素人";
        if (!artist.contractType) artist.contractType = contractByRating[artist.rating] || "新人约";
        const legacyStats = artist.stats || {};
        if (!artist.coreStats) {
          const legacyFashion = legacyStats.fashion || 50;
          const legacyBusiness = legacyStats.business || 50;
          const legacyVariety = legacyStats.variety || 50;
          artist.coreStats = {
            appearance: scaleTo1000((legacyFashion + legacyBusiness) / 2),
            stamina: scaleTo1000(legacyStats.dance || 52),
            fashion: scaleTo1000(legacyFashion),
            vocal: scaleTo1000(legacyStats.vocal || 50),
            acting: scaleTo1000(legacyStats.acting || 50),
            eq: scaleTo1000((legacyVariety + legacyBusiness) / 2)
          };
        } else {
          Object.keys(artist.coreStats).forEach((key) => artist.coreStats[key] = scaleTo1000(artist.coreStats[key]));
        }
        if (!artist.hiddenStats) {
          artist.hiddenStats = {
            audienceAffinity: scaleTo1000(artist.fans || 50),
            industryReputation: scaleTo1000(artist.reputation || 50),
            fanLoyalty: scaleTo1000(artist.fans || 50),
            scandal: scaleTo1000(artist.scandal || 0)
          };
        } else {
          Object.keys(artist.hiddenStats).forEach((key) => artist.hiddenStats[key] = scaleTo1000(artist.hiddenStats[key]));
        }
        artist.stats = {
          acting: artist.coreStats.acting,
          vocal: artist.coreStats.vocal,
          dance: artist.coreStats.stamina,
          variety: artist.coreStats.eq,
          fashion: artist.coreStats.fashion,
          business: artist.coreStats.eq
        };
        ["fame", "health", "stress", "trust", "obedience", "ambition", "depression", "terminationRisk"].forEach((key) => {
          if (artist[key] !== undefined) artist[key] = scaleTo1000(artist[key]);
        });
        artist.scandal = artist.hiddenStats.scandal;
        artist.fans = artist.hiddenStats.fanLoyalty;
        artist.reputation = artist.hiddenStats.industryReputation;
        if (!artist.riskFlags) artist.riskFlags = {healthBombDays: 0, romanceMineCount: 0, legalIssueCount: 0, mentalCrisisDays: 0};
      });
      if (game.avatarVersion !== 3) {
        game.artists.forEach((artist, index) => {
          artist.avatar = artistAvatar(artist.gender, index);
        });
        game.avatarVersion = 3;
        localStorage.setItem(SAVE_KEY, JSON.stringify(game));
      }
      if (Array.isArray(game.resources)) {
        game.resources.forEach((resource) => {
          if (!resource.slot) resource.slot = pick(["试镜沟通", "品牌背调", "平台排期", "商务报价", "宣发预热"]);
          if (!resource.condition) resource.condition = pick(["番位仍在谈", "名单未公开", "竞品同步报价", "品牌要求净词", "档期需要二次确认"]);
          resource.threshold = scaleTo1000(resource.threshold || 50);
          resource.risk = scaleTo1000(resource.risk || 40);
          resource.competition = scaleTo1000(resource.competition || 50);
          if (resource.used && !resource.result) {
            const winner = game.artists.find((artist) => artist.project === resource.name);
            resource.applicantId = winner?.id || game.artists.find((artist) => artist.owner === "player")?.id;
            resource.result = winner ? "won" : "lost";
          }
        });
        localStorage.setItem(SAVE_KEY, JSON.stringify(game));
      }
      return game;
    }

    function addLog(text) {
      const g = state.game;
      const time = `第 ${g.day} 天 ${timeSlots[g.slotIndex]}`;
      g.logs.unshift(`${time}：${text}`);

      $("toast").textContent = text;

    function applyPlayer(delta) {
      const p = state.game.player;
      Object.entries(delta).forEach(([key, value]) => {
        if (key === "money") p.money = Math.max(0, Math.round(p.money + value));
        else p[key] = clamp1000((p[key] || 0) + delta1000(value));
      });
    }

    function applyArtist(artist, delta) {
      const coreAlias = {dance: "stamina", variety: "eq", business: "eq"};
      const hiddenAlias = {reputation: "industryReputation", fans: "fanLoyalty", scandal: "scandal"};
      Object.entries(delta).forEach(([key, value]) => {
        const change = delta1000(value);
        const coreKey = coreAlias[key] || key;
        const hiddenKey = hiddenAlias[key] || key;
        if (artist.coreStats?.[coreKey] !== undefined) artist.coreStats[coreKey] = clamp1000(artist.coreStats[coreKey] + change);
        else if (artist.hiddenStats?.[hiddenKey] !== undefined) artist.hiddenStats[hiddenKey] = clamp1000(artist.hiddenStats[hiddenKey] + change);
        else if (artist.stats?.[key] !== undefined) artist.stats[key] = clamp1000(artist.stats[key] + change);
        else artist[key] = clamp1000((artist[key] || 0) + change);
      });
      syncArtistAliases(artist);
    }

    function syncArtistAliases(artist) {
      if (!artist.coreStats) return;
      artist.stats = {
        acting: artist.coreStats.acting,
        vocal: artist.coreStats.vocal,
        dance: artist.coreStats.stamina,
        variety: artist.coreStats.eq,
        fashion: artist.coreStats.fashion,
        business: artist.coreStats.eq
      };
      if (artist.hiddenStats) {
        artist.scandal = artist.hiddenStats.scandal;
        artist.fans = artist.hiddenStats.fanLoyalty;
        artist.reputation = artist.hiddenStats.industryReputation;
      }
    }

    function stageName(value) {
      if (value >= 800) return "顶级";
      if (value >= 600) return "优势";
      if (value >= 400) return "稳定";
      if (value >= 200) return "基础";
      return "薄弱";
    }

    function riskLevel() {
      const g = state.game;
      const avgScandal = getOwned().reduce((sum, a) => sum + a.scandal, 0) / Math.max(1, getOwned().length);

          choices: [
            {title:"证据收集", desc:"先查来源，适合法务高的路线。", action: () => startCrisis(artist, "黑热搜", "evidence")},
            {title:"温和通稿", desc:"降低对立，消耗公关预算。", action: () => startCrisis(artist, "黑热搜", "soft")},
            {title:"冷处理", desc:"省钱但风险不受控。", action: () => resolveChoice("选择冷处理，热度短暂下降但暗线仍在", {player:{money:0, stress:5, pr:-1}, artist:{scandal:8, fans:-3, trust:-2}})},
            {title:"推进时段", desc:"稍后再处理。", action: nextSlot}
          ]
        },
        {
          title: "晚宴名单里出现了熟人",
          scene: "品牌酒会",
          people: "品牌方负责人、平台内容总监、杂志编辑",
          risk: "公开露面会换来关系线索，也可能让艺人被现场比较。",
          desc: `今晚有品牌、平台和杂志编辑出席。邀请函没有写明议题，但几个关键席位都留给了今年要抢封面和商务短约的人。`,
          choices: [
            {title:"带艺人露面", desc:"曝光更高，也更容易被比较。", action: () => resolveChoice("带艺人参加酒会，拿到两条潜在线索", {player:{network:6, influence:3, stress:5, morale:-2}, artist:{fame:4, fashion:3, stress:5}})},
            {title:"独自社交", desc:"稳妥积累人脉，艺人压力不变。", action: () => resolveChoice("独自参加酒会，稳住品牌关系", {player:{network:5, negotiation:2, stress:4, money:-8}, artist:{trust:1}})},
            {title:"拒绝应酬", desc:"保住底线和休息。", action: () => resolveChoice("拒绝酒会，把时间留给团队复盘", {player:{morale:4, stress:-6, network:-2}, artist:{health:3, trust:3}})},
            {title:"推进时段", desc:"结束当前时段。", action: nextSlot}
          ]
        },
        {
          title: "排期里挤出半天空档",
          scene: "艺人培训室",
          people: `${artist.name}、执行经纪、课程老师`,
          risk: "训练会提高项目适配，但若压力持续高位，健康和服从度会下滑。",
          desc: `${artist.name} 下午临时空出半天。课程老师愿意加塞，但团队刚结束一轮通告，继续压训练可能影响后续执行。`,
          choices: [
            {title:"表演课", desc:"提升影视竞争力。", action: () => trainArtist(artist, "acting")},
            {title:"综艺反应", desc:"提升综艺与公关容错。", action: () => trainArtist(artist, "variety")},
            {title:"体能恢复", desc:"降低压力与健康风险。", action: () => resolveChoice("安排体能恢复，团队状态回稳", {player:{money:-8, stress:-2}, artist:{health:8, stress:-8, trust:2}})},
            {title:"推进时段", desc:"保留预算。", action: nextSlot}
          ]
        }
      ];
      return pick(pool);
    }

    function resolveChoice(summary, effects) {
      const artist = selectedArtist();
      if (effects.player) applyPlayer(effects.player);
      if (effects.artist) applyArtist(artist, effects.artist);
      state.game.lastAction = summary;
      addLog(summary);
      maybeTriggerPressureSlip();
      dailyDecay();
      saveGame();
      renderAll();
      setEvent({title:"结算完成", desc:`${summary}。状态已更新，你可以继续处理待办或推进到下一时段。`, choices:[
        {title:"推进时段", desc:"结算当前时段并进入下一段。", action: nextSlot},
        {title:"继续查看", desc:"留在当前页面检查状态。", action: () => toast("已停留在当前时段")}
      ]});
    }

    function trainArtist(artist, stat) {
      const cost = 16;
      if (state.game.player.money < cost) return toast("资金不足，无法安排训练");
      const names = {acting:"表演课", variety:"综艺反应"};
      resolveChoice(`为 ${artist.name} 安排${names[stat]}`, {
        player: {money: -cost, stress: 3, insight: 1},
        artist: {[stat]: 7, stress: 5, trust: 2, health: -2, obedience: -1}
      });
    }

    function competeForBestResource(artist, spend) {
      const resource = state.game.resources.find(r => !r.used) || generateResources(state.game.day, state.game.player)[0];
      applyResource(artist.id, resource.id, spend);
    }

    function applyResource(artistId, resourceId, spend = false) {
      const g = state.game;
      const artist = g.artists.find(a => a.id === artistId);
      const resource = g.resources.find(r => r.id === resourceId);
      if (!artist || !resource || resource.used) return;
      if (spend && g.player.money < 28) return toast("资金不足，无法强势竞价");
      const fit = artist.route === resource.fit ? 140 : 0;
      const attrMap = {影视:"acting", 综艺:"eq", 代言:"eq", 杂志:"fashion", 商务:"eq"};
      const attr = artist.coreStats[attrMap[resource.type]] || 500;
      const score = attr * .38 + artist.fame * .18 + artist.reputation * .15 + g.player.negotiation * .18 + g.player.network * .11 + fit - artist.scandal * .22 - resource.competition * .18 + (spend ? 180 : 0) - pressurePenalty();
      const success = score >= resource.threshold - 80;
      resource.used = true;
      resource.applicantId = artist.id;
      resource.result = success ? "won" : "lost";
      if (spend) applyPlayer({money:-28, stress:4});
      if (success) {
        applyPlayer({money: Math.round(resource.reward * .75), influence: 4, network: 2, stress: 4});
        applyArtist(artist, {fame: 6, reputation: 4, fans: 5, stress: 6, ambition: 2, terminationRisk: -2});
        artist.project = resource.name;
        g.news.unshift(`热搜上升：${artist.name} 拿下「${resource.name}」，粉丝开始控评庆祝。`);
        addLog(`${artist.name} 成功争取 ${resource.level} 级${resource.type}资源「${resource.name}」`);
      } else {
        applyPlayer({stress: 6, negotiation: 1, money: -8});
        applyArtist(artist, {stress: 7, trust: -3, scandal: 3, terminationRisk: 4, obedience: -2});
        g.rivalNews.unshift(`竞品抢单：${resource.name} 被其他公司截走，平台反馈你方报价与舆情不够稳。`);
        addLog(`${artist.name} 争取「${resource.name}」失败，竞品截走资源`);
      }
      saveGame();
      renderAll();
      setEvent({title: success ? "资源拿下" : "资源失手", desc: success ? `${artist.name} 的新项目已进入档案。高曝光也会带来额外压力。` : `这次失手暴露了谈判与舆情短板。竞品正在放大这次失败。`, choices:[
        {title:"查看资源池", desc:"检查剩余窗口。", action: () => switchTab("resources")},
        {title:"推进时段", desc:"进入下一段。", action: nextSlot}
      ]});
    }

    function startCrisis(artist, type, route) {
      const g = state.game;
      const crisis = {
        id: uid("crisis"), artistId: artist.id, type,
        stage: route === "evidence" ? "证据收集" : "通稿定调",
        countdown: 3,
        heat: clamp1000(450 + artist.scandal * .5 + Math.random() * 240)
      };
      g.crisis.push(crisis);
      const effects = route === "evidence"
        ? {player:{legal:3, stress:5, money:-10}, artist:{trust:2, scandal:-2}}
        : {player:{pr:3, stress:4, money:-18}, artist:{scandal:-4, fans:2, stress:3}};
      resolveChoice(`启动 ${artist.name} 的${type}危机处理：${crisis.stage}`, effects);
      switchTab("crisis");
    }

    function handleCrisis(id, mode) {
      const g = state.game;
      const crisis = g.crisis.find(c => c.id === id);
      if (!crisis) return;
      const artist = g.artists.find(a => a.id === crisis.artistId);
      const p = g.player;
      const modeCost = mode === "law" ? 22 : mode === "media" ? 18 : 10;
      if (p.money < modeCost) return toast("资金不足，无法执行该方案");
      const power = (mode === "law" ? p.legal : mode === "media" ? p.pr + p.mediaSense * .45 : p.network + p.pr * .35) + artist.trust * .15 - pressurePenalty();
      const success = power > crisis.heat * .72;
      applyPlayer({money:-modeCost, stress: success ? 5 : 9, pr: mode === "media" ? 2 : 0, legal: mode === "law" ? 2 : 0, network: mode === "fans" ? 2 : 0});
      if (success) {
        applyArtist(artist, {scandal:-14, reputation:5, fans: mode === "fans" ? 7 : 3, trust:4, stress:-2});
        g.news.unshift(`危机降温：${artist.name} 的${crisis.type}词条下降，核心粉丝恢复秩序。`);
        g.crisis = g.crisis.filter(c => c.id !== id);
        addLog(`成功处理 ${artist.name} 的${crisis.type}危机`);
      } else {
        crisis.heat = clamp1000(crisis.heat + 120);
        crisis.countdown -= 1;
        applyArtist(artist, {scandal:10, reputation:-5, fans:-6, stress:7, trust:-3});
        g.news.unshift(`危机升温：${artist.name} 的${crisis.type}出现二次扩散，倒计时剩余 ${crisis.countdown}。`);
        addLog(`${artist.name} 的${crisis.type}处理不利，热度上升`);
        if (crisis.countdown <= 0) {
          g.crisis = g.crisis.filter(c => c.id !== id);
          applyPlayer({influence:-6, morale:-4});
          addLog(`${artist.name} 的${crisis.type}造成长期口碑损失`);
        }
      }
      saveGame();
      renderAll();
    }

    function pressurePenalty() {
      const stress = state.game.player.stress;
      return stress > 800 ? 160 : stress > 650 ? 80 : stress > 500 ? 30 : 0;
    }

    function maybeTriggerPressureSlip() {
      const p = state.game.player;
      if (p.stress > 760 && Math.random() < p.stress * 0.001) {
        applyPlayer({negotiation:-20, pr:-20});
        addLog("高压导致一次判断失误，谈判与公关临时下滑");
      }
    }

    function dailyDecay() {
      getOwned().forEach(a => {
        if (a.stress > 700) applyArtist(a, {health:-20, trust:-10});
        if (a.scandal > 620) applyArtist(a, {industryReputation:-20, fanLoyalty:-20});
      });
    }

    function nextSlot() {
      const g = state.game;
      settleSlot();
      g.slotIndex += 1;
      if (g.slotIndex >= timeSlots.length) {
        g.slotIndex = 0;
        g.day += 1;
        newDay();
      }
      runRivals();
      saveGame();
      renderAll();
      setEvent(buildSlotReport());
    }

    function settleSlot() {
      const g = state.game;
      applyPlayer({stress: timeSlots[g.slotIndex] === "午夜攻坚" ? 4 : 2});
      g.crisis.forEach(c => {
        c.countdown -= 1;
        c.heat = clamp(c.heat + 3);
        const artist = g.artists.find(a => a.id === c.artistId);
        if (artist) applyArtist(artist, {scandal:3, stress:2});
      });
      g.crisis = g.crisis.filter(c => c.countdown > 0);
      addLog(`结束${timeSlots[g.slotIndex]}，完成时段结算`);
    }

    function newDay() {
      const g = state.game;
      g.resources = generateResources(g.day, g.player);
      getOwned().forEach(a => applyArtist(a, {health: 2, stress: -3, scandal: -1}));
      applyPlayer({stress:-5, money:-6});
      const focus = pick(["都市剧", "综艺飞行", "时尚商业", "杂志专题"]);
      g.news.unshift(`晨间简报：第 ${g.day} 天，市场偏好转向${focus}。资源池已刷新。`);
      if (g.day % 7 === 0) quarterlyShuffle();
    }

    function buildSlotReport() {
      const g = state.game;
      const slot = timeSlots[g.slotIndex];
      if (slot === "晨间会议") return buildIdleEvent();
      if (slot === "午夜攻坚") {
        return {
          title: "午夜报告",
          desc: `今日进入收尾阶段。当前风险指数 ${riskLevel()}，竞品仍可能在夜间释放通稿。`,
          choices: [
            {title:"整理危机预案", desc:"提高公关与法务，但增加压力。", action: () => resolveChoice("完成午夜危机预案", {player:{pr:2, legal:2, stress:4}, artist:{trust:1, scandal:-2}})},
            {title:"团队休整", desc:"降低全员压力。", action: () => { getOwned().forEach(a => applyArtist(a, {stress:-5, health:2})); resolveChoice("安排团队休整", {player:{stress:-7, morale:2}}); }},
            {title:"查看竞品动态", desc:"切到市场信息。", action: () => switchTab("market")},
            {title:"推进到明天", desc:"结束今日。", action: nextSlot}
          ]
        };
      }
      return randomEvent();
    }

    function runRivals() {
      const g = state.game;
      if (Math.random() < .42) return;
      const rival = pick(g.rivals);
      const target = pick(getOwned());
      const action = pick(["抢资源", "挖角试探", "舆论攻击", "联盟防守"]);
      if (action === "抢资源") {
        rival.resources = clamp(rival.resources + 3);
        g.rivalNews.unshift(`${rival.name} 抢下一个平台窗口，行业影响 +3。`);
      } else if (action === "挖角试探") {
        applyArtist(target, {trust:-3, stress:3});
        g.rivalNews.unshift(`${rival.name} 私下接触 ${target.name} 团队，你方信任度受扰动。`);
      } else if (action === "舆论攻击") {
        applyArtist(target, {scandal:6, reputation:-2});
        g.rivalNews.unshift(`${rival.name} 疑似放出对比通稿，${target.name} 舆情压力上升。`);
      } else {
        rival.mood = "结盟防守";
        g.rivalNews.unshift(`${rival.name} 与平台宣发团队绑定，短期竞争强度上升。`);
      }
      g.rivalNews = g.rivalNews.slice(0, 18);
    }

    function quarterlyShuffle() {
      const g = state.game;
      const top = [...g.rivals].sort((a, b) => b.influence + b.resources - a.influence - a.resources)[0];
      g.rivalNews.unshift(`季度洗牌：${top.name} 暂居竞品榜首，资源报价整体抬高。`);
      g.resources.forEach(r => r.competition = clamp(r.competition + 8));
    }

    function signArtist(id) {
      const g = state.game;
      const artist = g.artists.find(a => a.id === id);
      if (!artist || artist.owner === "player") return;
      const capacity = g.artistManager?.artistRosterCapacity || 1;
      if (getOwned().length >= capacity) return toast(`签约池已满：${getOwned().length}/${capacity}，请先扩充管理容量`);
      const cost = artist.rating === "S" ? 140 : artist.rating === "A" ? 96 : artist.rating === "B" ? 68 : 44;
      const chance = g.player.negotiation + g.player.network * .6 + g.player.influence * .3 - cost * .35 - pressurePenalty();
      if (g.player.money < cost) return toast("资金不足，无法签约");
      applyPlayer({money:-cost, stress:5, negotiation:2});
      if (chance > 460) {
        artist.owner = "player";
        artist.contract = "剩余 12 个月";
        applyArtist(artist, {trust: 12});
        addLog(`成功签约 ${artist.name}`);
        toast(`已签约 ${artist.name}`);
      } else {
        addLog(`签约 ${artist.name} 失败，对方选择继续观望`);
        toast("谈判失败，对方继续观望");
      }
      saveGame();
      renderAll();
    }

    function expandRosterCapacity() {
      const g = state.game;
      if (!g.artistManager) g.artistManager = {artistRosterCapacity: 1};
      if (g.artistManager.artistRosterCapacity >= 5) return toast("签约池容量已达上限 5 人");
      const cost = 160 + g.artistManager.artistRosterCapacity * 80;
      if (g.player.money < cost) return toast(`资金不足，扩容需要 ${cost} 万`);
      applyPlayer({money: -cost, stress: 4, networkSkill: 2});
      g.artistManager.artistRosterCapacity += 1;
      addLog(`扩充签约池容量至 ${g.artistManager.artistRosterCapacity}/5`);
      saveGame();
      renderAll();
      toast(`签约池已扩充至 ${g.artistManager.artistRosterCapacity}/5`);
    }

    function renderAll() {
      evaluateCareerProgress();
      renderTopbar();
      renderLeft();
      renderEvent();
      renderWorkspace();
      renderFeeds();
    }

    function evaluateCareerProgress() {
      const g = state.game;
      if (!g.artistManager) g.artistManager = {artistRosterCapacity: 1};
      const owned = getOwned();
      const hasThirdTier = owned.some((artist) => ["三线", "二线", "一线", "顶流明星"].includes(artist.debutStatus));
      const hasSecondTier = owned.some((artist) => ["二线", "一线", "顶流明星"].includes(artist.debutStatus));
      const hasTopArtist = owned.some((artist) => artist.debutStatus === "顶流明星" || artist.fame >= 900);
      let nextCareer = "实习助理";
      let minCapacity = 1;
      if (owned.length >= 2 && hasThirdTier) { nextCareer = "初级经纪"; minCapacity = 2; }
      if (hasSecondTier) { nextCareer = "资深经纪"; minCapacity = 3; }
      if (hasTopArtist && g.resources?.some((r) => r.level === "S" && r.result === "won")) { nextCareer = "明星推手"; minCapacity = 4; }
      if (g.player.career !== nextCareer) {
        g.player.career = nextCareer;
        addLog(`职业阶梯更新为「${nextCareer}」`);
      }
      g.artistManager.artistRosterCapacity = Math.min(5, Math.max(g.artistManager.artistRosterCapacity, minCapacity));
    }

    function renderTopbar() {
      const g = state.game, p = g.player;
      $("dateText").textContent = `第 ${g.day} 天 ${timeSlots[g.slotIndex]}`;
      $("moneyText").textContent = `${p.money} 万`;
      $("stressText").textContent = `${p.stress} / 1000`;
      $("moraleText").textContent = `${p.morale} / 1000`;
      $("networkText").textContent = `${p.network} / 1000`;
      $("influenceText").textContent = `${p.influence} / 1000`;
      $("playerTitle").textContent = p.name;
      $("agencyTitle").textContent = `${p.age} 岁 · ${p.background} · ${p.agency} · ${p.career}`;
      const debuff = $("debuffTag");
      debuff.textContent = p.stress > 800 ? "职业倦怠" : p.stress > 650 ? "压力预警" : "状态稳定";
      debuff.className = `tag ${p.stress > 650 ? "danger" : "ok"}`;
    }

    function renderLeft() {
      const p = state.game.player;
      const statDefs = [
        ["洞察", p.insight], ["谈判", p.negotiation], ["公关", p.pr], ["人脉网", p.networkSkill], ["法务", p.legal], ["影响力", p.influence]
      ];
      $("playerStats").innerHTML = statDefs.map(([label, value]) => `
        <div class="stat-row"><span>${label}</span><div class="bar"><i style="--v:${barPct(value)}"></i></div><span>${stageName(value)}</span></div>
      `).join("") + `
        <div class="mini-card" style="margin-top:12px">
          <h3>管理结构</h3>
          <p>签约容量 ${state.game.artistManager?.artistRosterCapacity || 1} / 5 · 隐藏资源需通过剧情或背景逐步揭示</p>
        </div>
      `;
      const owned = getOwned();
      $("artistCount").textContent = `${owned.length}/${state.game.artistManager?.artistRosterCapacity || 1} 人`;
      if (!state.selectedArtistId || !owned.some(a => a.id === state.selectedArtistId)) state.selectedArtistId = owned[0]?.id;
      $("ownedArtists").innerHTML = owned.map(a => `
        <div class="artist-card ${a.id === state.selectedArtistId ? "active" : ""}" data-artist="${a.id}">
          <img src="${a.avatar}" alt="${a.name}">
          <div><strong>${a.name}</strong><div class="subtle">${a.route} · ${a.project}</div></div>
          <span class="badge ${a.rating === "S" ? "gold" : ""}">${a.rating}</span>
        </div>
      `).join("");
      document.querySelectorAll("[data-artist]").forEach(el => {
        el.addEventListener("click", () => {
          state.selectedArtistId = el.dataset.artist;
          switchTab("artists");
        });
      });
    }

    function renderEvent() {
      const e = state.currentEvent || buildIdleEvent();
      state.currentEvent = e;
      const meta = [
        e.scene ? `<span class="tag ok">场景：${e.scene}</span>` : "",
        e.people ? `<span class="tag">关联：${e.people}</span>` : "",
        e.risk ? `<span class="tag danger">风险：${e.risk}</span>` : ""
      ].filter(Boolean).join("");
      $("eventCard").innerHTML = `
        <div class="eyebrow">${timeSlots[state.game.slotIndex]} · ${state.game.lastAction}</div>
        <h2>${e.title}</h2>
        ${meta ? `<div class="event-meta">${meta}</div>` : ""}
        <p>${e.desc}</p>
        <div class="choice-grid">${e.choices.map((c, i) => `
          <button class="choice" data-choice="${i}"><strong>${c.title}</strong><span>${c.desc}</span></button>
        `).join("")}</div>
      `;
      document.querySelectorAll("[data-choice]").forEach(btn => {
        btn.addEventListener("click", () => e.choices[Number(btn.dataset.choice)].action());
      });
    }

    function switchTab(tab) {
      state.currentTab = tab;
      document.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
      renderWorkspace();
    }

    function renderWorkspace() {
      const tab = state.currentTab;
      const artist = selectedArtist();
      if (tab === "todo") return renderTodo();
      if (tab === "artists") return renderArtistDetail(artist);
      if (tab === "resources") return renderResources();
      if (tab === "crisis") return renderCrisis();
      if (tab === "market") return renderMarket();
    }

    function renderTodo() {
      const g = state.game;
      $("workspace").innerHTML = `
        <div class="grid-two">
          <div class="mini-card"><h3>今日待办</h3><p>${g.day === 1 ? "完成首次资源争夺，至少处理一条潜在舆情。" : "检查资源池、艺人压力与竞品动作。"}</p><button onclick="switchTab('resources')">查看资源池</button></div>
          <div class="mini-card"><h3>预警系统</h3><p>当前风险指数 ${riskLevel()}。压力越高，关键选择的失误率越高。</p><button onclick="switchTab('crisis')">处理危机</button></div>
          <div class="mini-card"><h3>当前重点</h3><p>${selectedArtist().name}：${selectedArtist().project}，信任 ${selectedArtist().trust}，黑料 ${selectedArtist().scandal}。</p><button onclick="switchTab('artists')">查看档案</button></div>
          <div class="mini-card"><h3>时间推进</h3><p>时间不可逆。结束当前时段会结算压力、舆情和竞品动作。</p><button class="primary" onclick="nextSlot()">推进时段</button></div>
        </div>
      `;
    }

    function renderArtistDetail(a) {
      if (!a) return $("workspace").innerHTML = `<div class="empty">暂无旗下艺人</div>`;
      const riskHint = (value) => value >= 800 ? "极高" : value >= 600 ? "偏高" : value >= 400 ? "可控" : value >= 200 ? "低位" : "安全";
      const stats = [["颜值", a.coreStats.appearance], ["体力", a.coreStats.stamina], ["时尚感", a.coreStats.fashion], ["歌艺", a.coreStats.vocal], ["演技", a.coreStats.acting], ["情商", a.coreStats.eq]];
      const mindStats = [["服从", a.obedience], ["野心", a.ambition], ["信任", a.trust], ["抑郁指数", a.depression]];
      $("workspace").innerHTML = `
        <div class="profile">
          <img class="avatar" src="${a.avatar}" alt="${a.name}">
          <div><h2>${a.name} <span class="badge ${a.rating === "S" ? "gold" : ""}">${a.rating}</span></h2><div class="subtle">${a.age} 岁 · ${a.debutStatus} · ${a.route} · ${a.contractType} · ${a.contract}</div></div>
        </div>
        <div class="grid-two">
          <div class="mini-card"><h3>公开状态</h3><p>当前项目：${a.project}</p><p>咖位 ${a.fame} / 健康 ${a.health} / 压力 ${a.stress}</p><p>粉丝活跃：${riskHint(a.fans)} · 业内反馈：${riskHint(a.reputation)}</p></div>
          <div class="mini-card ${a.scandal > 600 ? "warn" : ""}"><h3>有限情报</h3><p>${a.hiddenUnlocked ? `${a.risk}；黑料预警 ${riskHint(a.scandal)}，解约风险 ${riskHint(a.terminationRisk)}。` : "只看到表层迹象：团队反馈不完整。黑料值与解约风险不会直接明牌，需要更高信赖、人脉或持续接触后才能判断。"}</p><button onclick="unlockHidden('${a.id}')">尝试解锁情报</button></div>
        </div>
        <div class="mini-card" style="margin-top:12px"><h3>心理与合约压力</h3><div class="stat-list">${mindStats.map(([label, value]) => `<div class="stat-row"><span>${label}</span><div class="bar ${label.includes("抑郁") ? "danger" : ""}"><i style="--v:${barPct(value)}"></i></div><span>${stageName(value)}</span></div>`).join("")}</div><p>解约风险目前处在${riskHint(a.terminationRisk)}。信任度、合约类型、竞品挖角和长期压力，都会慢慢改变 TA 留在团队里的意愿。</p></div>
        <div class="mini-card" style="margin-top:12px"><h3>六大核心属性</h3><div class="stat-list">${stats.map(([label, value]) => `<div class="stat-row"><span>${label}</span><div class="bar"><i style="--v:${barPct(value)}"></i></div><span>${stageName(value)}</span></div>`).join("")}</div></div>
        <div class="actions" style="margin-top:12px">
          <button onclick="trainArtistById('${a.id}','acting')">表演培训</button>
          <button onclick="trainArtistById('${a.id}','variety')">综艺训练</button>
          <button onclick="restArtist('${a.id}')">健康管理</button>
          <button class="primary" onclick="switchTab('resources')">为 TA 争资源</button>
        </div>
      `;
    }

    function renderResources() {
      const artists = state.game.artists;
      const optionLabel = (a) => `${a.name}｜${a.route}${a.owner === "player" ? "｜旗下" : "｜市场候选"}`;
      const resourceClass = (r) => r.result === "won" ? "resource-won" : r.result === "lost" ? "resource-lost" : "";
      const resultTag = (r) => r.result === "won" ? `<span class="tag ok">已拿下</span>` : r.result === "lost" ? `<span class="tag danger">未拿下</span>` : "";
      const selectedAttr = (r, a) => r.applicantId === a.id ? "selected" : "";
      $("workspace").innerHTML = `
        <div class="grid-two">
          ${state.game.resources.map(r => `
            <div class="mini-card ${resourceClass(r)}">
              <div class="panel-title"><h3>${r.name}</h3><span>${resultTag(r)} <span class="badge ${r.level === "S" ? "gold" : ""}">${r.level}</span></span></div>
              <p>${r.type} · ${r.slot} · 适配 ${r.fit} · 门槛 ${r.threshold} · 竞争 ${r.competition} · 风险 ${r.risk}</p>
              <p>已知条件：${r.condition}。最终标准不会完全明牌，需结合艺人口碑、档期与竞品报价判断。</p>
              <select id="sel_${r.id}" ${r.used ? "disabled" : ""}>${artists.map(a => `<option value="${a.id}" ${selectedAttr(r, a)}>${optionLabel(a)}</option>`).join("")}</select>
              <div class="actions" style="margin-top:10px">
                <button ${r.used ? "disabled" : ""} onclick="applyResource(document.getElementById('sel_${r.id}').value,'${r.id}',false)">常规申请</button>
                <button ${r.used ? "disabled" : ""} onclick="applyResource(document.getElementById('sel_${r.id}').value,'${r.id}',true)">强势竞价</button>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderCrisis() {
      const crises = state.game.crisis;
      if (!crises.length) {
        $("workspace").innerHTML = `<div class="empty">当前暂无进行中的危机。保持警惕，黑热搜、代言冲突和健康问题可能在任意时段出现。</div>`;
        return;
      }
      $("workspace").innerHTML = `<div class="grid-two">${crises.map(c => {
        const a = state.game.artists.find(x => x.id === c.artistId);
        return `<div class="mini-card warn">
          <div class="panel-title"><h3>${a.name} · ${c.type}</h3><span class="tag danger">${c.countdown} 段倒计时</span></div>
          <p>阶段：${c.stage}。热度 ${c.heat}。处理需要综合法务、公关、媒体关系、资金与艺人信任。</p>
          <div class="actions">
            <button onclick="handleCrisis('${c.id}','law')">法务证据</button>
            <button onclick="handleCrisis('${c.id}','media')">全网通稿</button>
            <button onclick="handleCrisis('${c.id}','fans')">粉丝安抚</button>
          </div>
        </div>`;
      }).join("")}</div>`;
    }

    function renderMarket() {
      const market = state.game.artists.filter(a => a.owner !== "player");
      const capacity = state.game.artistManager?.artistRosterCapacity || 1;
      const ownedCount = getOwned().length;
      $("workspace").innerHTML = `
        <div class="mini-card" style="margin-bottom:12px">
          <div class="panel-title"><h3>签约池容量</h3><span class="tag ${ownedCount >= capacity ? "danger" : "ok"}">${ownedCount}/${capacity} 人</span></div>
          <p>结构规则：签约池初始 1 人，上限 5 人。超出容量时禁止新增签约，扩容会消耗资金并增加短期压力。</p>
          <button onclick="expandRosterCapacity()" ${capacity >= 5 ? "disabled" : ""}>扩充签约池</button>
        </div>
        <div class="grid-two">
          ${market.map(a => `
            <div class="mini-card">
              <div class="profile" style="grid-template-columns:54px 1fr">
                <img class="artist-portrait" src="${a.avatar}" alt="${a.name}">
                <div><h3>${a.name} <span class="badge ${a.rating === "S" ? "gold" : ""}">${a.rating}</span></h3><div class="subtle">${a.route} · ${a.owner ? rivalName(a.owner) : "自由艺人"}</div></div>
              </div>
              <p>咖位 ${a.fame} / 口碑 ${stageName(a.reputation)} / 潜在风险：${state.game.player.network > 700 ? a.risk : "情报不足"}</p>
              <button onclick="signArtist('${a.id}')">签约谈判</button>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderFeeds() {
      const g = state.game;
      const risk = riskLevel();
      $("riskBadge").textContent = risk > 700 ? "高风险" : risk > 450 ? "中风险" : "低风险";
      $("riskBadge").className = `tag ${risk > 700 ? "danger" : risk > 450 ? "hot" : "ok"}`;
      $("newsFeed").innerHTML = g.news.slice(0, 8).map((n, i) => `<div class="ticker-item"><span class="tag ${i === 0 ? "hot" : ""}">热搜</span> ${n}</div>`).join("");
      $("rivalFeed").innerHTML = g.rivalNews.slice(0, 8).map(n => `<div class="ticker-item">${n}</div>`).join("");
      $("logFeed").innerHTML = g.logs.slice(0, 12).map(l => `<div class="log-entry">${l}</div>`).join("");
    }

    function rivalName(id) {
      return state.game.rivals.find(r => r.id === id)?.name || "未知公司";
    }

    function unlockHidden(id) {
      const a = state.game.artists.find(x => x.id === id);
      if (!a) return;
      const p = state.game.player;
      if (a.trust + p.network + p.insight > 1450) {
        a.hiddenUnlocked = true;
        addLog(`解锁 ${a.name} 的潜在风险情报：${a.risk}`);
        toast("情报已解锁");
      } else {
        applyPlayer({network:1, stress:2});
        toast("情报不足，暂未解锁");
      }
      saveGame();
      renderAll();
    }

    function trainArtistById(id, stat) {
      const a = state.game.artists.find(x => x.id === id);
      if (a) trainArtist(a, stat);
    }

    function restArtist(id) {
      const a = state.game.artists.find(x => x.id === id);
      if (!a) return;
      if (state.game.player.money < 12) return toast("资金不足，无法安排健康管理");
      resolveChoice(`为 ${a.name} 安排健康管理`, {player:{money:-12, stress:-2}, artist:{health:10, stress:-10, trust:3}});
    }

    function openLogModal() {
      $("modal").innerHTML = `<section class="modal-box glass"><div class="panel-title"><h2>完整日志</h2><button onclick="closeModal()">关闭</button></div>${state.game.logs.map(l => `<div class="log-entry">${l}</div>`).join("")}</section>`;
      $("modal").classList.remove("hidden");
    }

    function closeModal() {
      $("modal").classList.add("hidden");
    }

    function enterGame(game) {
      state.game = game;
      state.selectedArtistId = getOwned()[0]?.id;
      state.currentTab = "todo";
      state.currentEvent = buildIdleEvent();
      $("startScreen").classList.add("hidden");
      $("gameScreen").classList.remove("hidden");
      renderAll();
      saveGame();
    }

    $("startForm").addEventListener("submit", (ev) => {
      ev.preventDefault();
      const name = $("playerName").value.trim() || "新锐经纪人";
      const agency = $("agencyName").value.trim() || "无名工作室";
      const age = clamp(Number($("playerAge").value) || 26, 20, 35);
      enterGame(createGame(name, agency, age, $("stylePick").value));
    });

    $("continueBtn").addEventListener("click", () => {
      const saved = loadGame();
      if (saved) enterGame(saved);
      else toast("没有可继续的存档");
    });

    $("wipeBtn").addEventListener("click", () => {
      localStorage.removeItem(SAVE_KEY);
      $("saveHint").textContent = "未检测到存档";
      toast("存档已清除");
    });

    $("saveBtn").addEventListener("click", () => saveGame(true));
    $("restartBtn").addEventListener("click", () => {
      if (confirm("确定重开？当前存档会被清除。")) {
        localStorage.removeItem(SAVE_KEY);
        location.reload();
      }
    });
    $("logBtn").addEventListener("click", openLogModal);
    $("modal").addEventListener("click", (ev) => { if (ev.target.id === "modal") closeModal(); });
    document.querySelectorAll(".tab").forEach(btn => btn.addEventListener("click", () => switchTab(btn.dataset.tab)));

    const saved = loadGame();
    $("saveHint").textContent = saved ? `检测到存档：第 ${saved.day} 天 ${timeSlots[saved.slotIndex]}` : "未检测到存档";
    $("continueBtn").disabled = !saved;

    window.switchTab = switchTab;
    window.nextSlot = nextSlot;
    window.trainArtistById = trainArtistById;
    window.restArtist = restArtist;
    window.applyResource = applyResource;
    window.handleCrisis = handleCrisis;
    window.signArtist = signArtist;
    window.expandRosterCapacity = expandRosterCapacity;
    window.unlockHidden = unlockHidden;
    window.closeModal = closeModal;
  </script>
</body>
</html>
